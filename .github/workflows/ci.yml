name: anity-ci

# Only run when a version tag is pushed (e.g. v1.0.0) — not on every commit.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual run when needed

concurrency:
  group: anity-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Compile-only gate — no package / test / native / smoke
jobs:
  compile:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Build (compile check)
        shell: bash
        run: |
          set -euo pipefail
          echo "Tag: ${GITHUB_REF_NAME:-manual}"
          dotnet --info
          # Required stack
          dotnet build anity-lib-core/src/Anity.Core/Anity.Core.csproj -c Release --nologo -v minimal
          dotnet build anity-agent/src/Anity.Agent/Anity.Agent.csproj -c Release --nologo -v minimal
          dotnet build anity-cli/src/Anity.Cli/Anity.Cli.csproj -c Release --nologo -v minimal
          # Optional products (warn only)
          dotnet build anity-editor/src/Anity.Editor.Host/Anity.Editor.Host.csproj -c Release --nologo -v minimal || true
          dotnet build anity-webgl/src/Anity.WebGL/Anity.WebGL.csproj -c Release --nologo -v minimal || true
          dotnet build anity-hub/src/Anity.Hub/Anity.Hub.csproj -c Release --nologo -v minimal || true
          echo "compile check OK"
